source:
  type: rednote
  account_user_id: 60b6bf360000000001007c35   # 账号 ID（从 profile URL 里取）
  mode: favorites       # favorites=收藏 | posted=发布 | target_url | search
  max_scroll: 20        # 滚动次数（收藏多可调高）
  request_delay: 1.5    # 每个帖子间隔秒数
  video_only: true      # 只收集视频帖（跳过图文）
  credentials_file: kknd2024.json   # EdenGateway/rednote/accounts/ 下的账号文件

download_dir: /home/kingy/Foundation/EdenGateway/rednote_downloads
max_posts: 50
analyzer: none          # 视频转文字走 transcribe 节点，不用视觉 analyzer
analyze_model:
frame_interval: 10
max_frames: 8
pixeldrain_api_key:

# ── LLM Summarisation ──────────────────────────────────────────────────────
# summarize_backend: "ollama" | "claude" | "none"
#   ollama  → local Ollama server (set summarize_model to your model name)
#   claude  → Anthropic SDK (needs ANTHROPIC_API_KEY env var)
#   none    → skip summarisation (default)
summarize: true
summarize_backend: none
summarize_model: ""          # e.g. "qwen2.5:7b" for ollama, "claude-haiku-4-5" for claude
ollama_url: http://localhost:11434
